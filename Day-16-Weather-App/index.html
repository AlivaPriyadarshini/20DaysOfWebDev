<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <!-- * Linking CSS File -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🌦️ Weather App</h1>
        <input type="text" id="city" placeholder="Enter City Name">
        <button id="btn">
            Get Weather
        </button>

        <div class="weather">
            <h2 id="cityName">
                City : 
            </h2>
            <h2 id="temp">
                Temperature : 
            </h2>
            <h2 id="condition">
                Condition :
            </h2>
            <h2 id="humidity">

            </h2>
            <h2 id="wind">
                Wind Speed :
            </h2>
        </div>
    </div>
    <!-- * Linking JavaScript File -->

    <script src="./config.js"></script>

    <script src="./script.js"></script>

</body>
</html>
