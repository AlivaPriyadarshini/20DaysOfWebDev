<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Color Changer</title>
    <!--* Linking CSS File -->
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="container">
        <h1>Random Color Changer</h1>
        <div class="color-box" id="color-box">
            <p class="code" id="code">
                linear-gradient(135deg, #4158D0, #C850C0)
            </p>
        </div>
        <div class="buttons" id="buttons">
            <button id="btn1">
                Generate Color
            </button>
            <button id="btn2">
                Linear-Gradient
            </button>
            <button id="copyBtn">
                Copy Code
            </button>
        </div>
    </div>

    <!--* Linking JavaScript File -->

    <script src="./script.js"></script>
</body>
</html>
