<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Counter</title>
    <!--* Linking CSS File  -->
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="container">
        <h1>✍️ Character Counter</h1>
        <textarea name="text" id="text" placeholder="Start typing here....." maxlength="200"></textarea>
        <div class="info">
            <p>Character : <span id="charCount">0</span></p>

            <p>Words : <span id="wordCount">0</span></p>

            <p>Remaining : <span id="remaining">200</span></p>
        </div>
    </div>
    <!--* Linking JavaScript File  -->
    <script src="./script.js"></script>
</body>
</html>
